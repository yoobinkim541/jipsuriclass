name: Sync Blog Snapshot

# 매일 블로그 글을 DB 스냅샷으로 동기화한다(외부 장애와 무관하게 홈·포트폴리오 표시).
# 필요한 저장소 시크릿: BLOG_SYNC_SECRET (api/sync-blog-snapshot.ts의 BLOG_SYNC_SECRET과 동일 값)
on:
  schedule:
    - cron: "0 18 * * *" # 매일 03:00 KST (UTC 18:00)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call blog snapshot sync endpoint
        run: |
          curl -fsS -X POST "https://www.jipsuriclass.kr/api/sync-blog-snapshot" \
            -H "x-sync-secret: ${{ secrets.BLOG_SYNC_SECRET }}"
