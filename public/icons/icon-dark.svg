<svg width="560" height="560" viewBox="0 0 560 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="집수리클라쓰">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13315a"/>
      <stop offset="1" stop-color="#0a1730"/>
    </linearGradient>
    <linearGradient id="gold" x1="120" y1="110" x2="440" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6d488"/>
      <stop offset="0.55" stop-color="#e7b75f"/>
      <stop offset="1" stop-color="#c9923c"/>
    </linearGradient>
  </defs>

  <!-- 배경: 다크 네이비 라운드 스퀘어 -->
  <rect width="560" height="560" rx="124" fill="url(#bg)"/>
  <rect x="3" y="3" width="554" height="554" rx="121" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="6"/>

  <!-- 브랜드 골드 링 -->
  <circle cx="280" cy="280" r="206" fill="none" stroke="url(#gold)" stroke-width="15"/>

  <!-- 집 실루엣 (크림) -->
  <g stroke="#FBF9F6" stroke-width="26" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M168 286 L280 188 L392 286"/>
    <path d="M196 268 L196 388 L364 388 L364 268"/>
  </g>

  <!-- 문 (골드 강조) -->
  <rect x="262" y="318" width="36" height="70" rx="7" fill="url(#gold)"/>

  <!-- 창문 2개 (크림) -->
  <rect x="216" y="312" width="30" height="30" rx="6" fill="#FBF9F6"/>
  <rect x="314" y="312" width="30" height="30" rx="6" fill="#FBF9F6"/>

  <!-- 청진기 챙(브랜드 모티프): 골드 작은 원 -->
  <circle cx="396" cy="398" r="20" fill="none" stroke="url(#gold)" stroke-width="13"/>
</svg>
